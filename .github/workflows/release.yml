name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: build (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
            cross: true
          # macOS arm64 builds natively on macos-latest (an arm64
          # runner). macOS x86_64 cross-compiles from the same arm64
          # runner via `rustup target add x86_64-apple-darwin`,
          # avoiding the deprecated/queue-stalled macos-13 Intel
          # runner entirely.
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          key: release-${{ matrix.target }}

      - name: Install cross (Linux aarch64 only)
        if: matrix.cross == true
        run: cargo install cross --locked

      - name: Build with cargo
        if: matrix.cross != true
        env:
          TARGET: ${{ matrix.target }}
        run: cargo build --release --target "$TARGET" --bin guardep
        shell: bash

      - name: Build with cross
        if: matrix.cross == true
        env:
          TARGET: ${{ matrix.target }}
        run: cross build --release --target "$TARGET" --bin guardep

      - name: Package (tar.gz)
        if: matrix.archive == 'tar.gz'
        shell: bash
        env:
          TAG: ${{ github.ref_name }}
          TARGET: ${{ matrix.target }}
        run: |
          # Strip leading `v` so artifacts are guardep-<X.Y.Z>-<target>.
          # Both the Homebrew formula and the GitHub Action wrapper
          # expect the version-only naming convention.
          VERSION="${TAG#v}"
          STAGING="guardep-${VERSION}-${TARGET}"
          mkdir -p "$STAGING"
          cp "target/${TARGET}/release/guardep" "$STAGING/"
          cp README.md LICENSE "$STAGING/"
          tar -czf "$STAGING.tar.gz" "$STAGING"
          shasum -a 256 "$STAGING.tar.gz" > "$STAGING.tar.gz.sha256"

      - name: Package (zip)
        if: matrix.archive == 'zip'
        shell: pwsh
        env:
          TAG: ${{ github.ref_name }}
          TARGET: ${{ matrix.target }}
        run: |
          $version = $env:TAG -replace '^v',''
          $staging = "guardep-$version-$env:TARGET"
          New-Item -ItemType Directory -Path $staging | Out-Null
          Copy-Item "target/$env:TARGET/release/guardep.exe" $staging
          Copy-Item README.md, LICENSE $staging
          Compress-Archive -Path $staging -DestinationPath "$staging.zip"
          (Get-FileHash "$staging.zip" -Algorithm SHA256).Hash | Out-File "$staging.zip.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@6f51ac03b9356f520e9adb1b1b7802705f340c2b # v4.5.0
        with:
          name: guardep-${{ matrix.target }}
          path: |
            guardep-*.tar.gz
            guardep-*.tar.gz.sha256
            guardep-*.zip
            guardep-*.zip.sha256
          if-no-files-found: error

  publish:
    name: publish github release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist
          merge-multiple: true

      - name: Render install snippet
        id: install_snippet
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          VERSION="${TAG#v}"
          # The body is rendered once per tag and prepended to the
          # auto-generated changelog. Keeps the install commands at
          # the top of every Release page.
          {
            echo "body<<INSTALL_EOF"
            cat <<EOF
          ## Install

          ### Homebrew (macOS arm64 / macOS Intel / Linux x86_64 / Linux arm64)

          ```bash
          brew tap roussi/tap
          brew install guardep
          ```

          ### Windows

          Download `guardep-${VERSION}-x86_64-pc-windows-msvc.zip` from the assets below, unzip, place `guardep.exe` on PATH.

          ### From source (any platform with Rust toolchain)

          ```bash
          cargo install --git https://github.com/${GITHUB_REPOSITORY} guardep-cli --tag ${TAG}
          ```

          ### Verify

          ```bash
          guardep --version    # → guardep ${VERSION}
          guardep --help
          ```

          See the [README](https://github.com/${GITHUB_REPOSITORY}#readme) and [DOCUMENTATION.md](https://github.com/${GITHUB_REPOSITORY}/blob/main/DOCUMENTATION.md) for full usage.

          ---
          EOF
            echo "INSTALL_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@c95fe1489396fe8a9eb87c0abf8aa5b2ef267fda # v2.2.1
        with:
          files: |
            dist/guardep-*.tar.gz
            dist/guardep-*.tar.gz.sha256
            dist/guardep-*.zip
            dist/guardep-*.zip.sha256
          generate_release_notes: true
          append_body: true
          body: ${{ steps.install_snippet.outputs.body }}
          fail_on_unmatched_files: true

  publish-homebrew:
    name: publish homebrew formula
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
    # Skip on prereleases (-rc, -beta, etc.) so only stable tags
    # bump the formula. Tags must match `vX.Y.Z` exactly.
    if: ${{ !contains(github.ref_name, '-') }}
    steps:
      - name: Checkout source repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: source

      - name: Checkout tap repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: roussi/homebrew-tap
          path: tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          persist-credentials: true

      - name: Download release tarballs
        env:
          TAG: ${{ github.ref_name }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p dist
          gh release download "$TAG" \
            --repo "${GITHUB_REPOSITORY}" \
            --dir dist \
            --pattern 'guardep-*.tar.gz'

      - name: Render formula
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          VERSION="${TAG#v}"
          # Pull each per-platform sha256 from its sidecar file or
          # compute from the tarball; both work because the build job
          # already attached `*.sha256` files to the release.
          shasum_for() {
            local target="$1"
            local file="dist/guardep-${VERSION}-${target}.tar.gz"
            if [ ! -f "$file" ]; then
              echo "missing: $file" >&2
              exit 1
            fi
            shasum -a 256 "$file" | awk '{print $1}'
          }
          SHA_DARWIN_ARM=$(shasum_for "aarch64-apple-darwin")
          SHA_DARWIN_X86=$(shasum_for "x86_64-apple-darwin")
          SHA_LINUX_ARM=$(shasum_for "aarch64-unknown-linux-gnu")
          SHA_LINUX_X86=$(shasum_for "x86_64-unknown-linux-gnu")
          mkdir -p tap/Formula
          # Render directly rather than sed-replacing the template so
          # the result is fully decoupled from the source-repo template
          # comments and per-edit drift.
          cat > tap/Formula/guardep.rb <<EOF
          class Guardep < Formula
            desc "Package-manager firewall: blocks risky npm/pnpm/yarn/mvn installs before postinstall runs"
            homepage "https://github.com/${GITHUB_REPOSITORY}"
            license "MIT"
            version "${VERSION}"

            on_macos do
              on_arm do
                url "https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}/guardep-${VERSION}-aarch64-apple-darwin.tar.gz"
                sha256 "${SHA_DARWIN_ARM}"
              end
              on_intel do
                url "https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}/guardep-${VERSION}-x86_64-apple-darwin.tar.gz"
                sha256 "${SHA_DARWIN_X86}"
              end
            end

            on_linux do
              on_arm do
                url "https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}/guardep-${VERSION}-aarch64-unknown-linux-gnu.tar.gz"
                sha256 "${SHA_LINUX_ARM}"
              end
              on_intel do
                url "https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}/guardep-${VERSION}-x86_64-unknown-linux-gnu.tar.gz"
                sha256 "${SHA_LINUX_X86}"
              end
            end

            def install
              # Tarball top-level dir is `guardep-<ver>-<target>/`.
              # Homebrew strips it because the prefix matches the
              # formula name, so the binary lands at the buildpath
              # root.
              bin.install "guardep"
            end

            def caveats
              <<~EOC
                To enforce the package-manager firewall locally:

                  guardep shims install

                This wires npm/pnpm/yarn/mvn/cargo through guardep via PATH shims placed in
                ~/.guardep/bin. Reverse with \`guardep shims uninstall\`.
              EOC
            end

            test do
              assert_match "guardep ${VERSION}", shell_output("#{bin}/guardep --version")
              (testpath/"empty").mkpath
              system bin/"guardep", "audit", "--path", testpath/"empty", "--fail-on", "never"
            end
          end
          EOF

      - name: Commit + push to tap
        env:
          TAG: ${{ github.ref_name }}
        working-directory: tap
        run: |
          set -euo pipefail
          git config user.name  "guardep-release-bot"
          git config user.email "guardep-release-bot@users.noreply.github.com"
          git add Formula/guardep.rb
          if git diff --cached --quiet; then
            echo "::notice::formula already up to date for ${TAG}"
            exit 0
          fi
          git commit -m "guardep ${TAG}"
          git push
