name: scorecard

# Runs OpenSSF Scorecard against this repo every Monday plus on
# push to main. Uploads results as SARIF so the security tab and
# the public Scorecard registry stay in sync.

on:
  branch_protection_rule:
  schedule:
    - cron: "0 7 * * 1"
  push:
    branches: [main]

permissions: read-all

jobs:
  analysis:
    name: scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@ff5dd8929f96a8a4dc67d13f32b8c75057829621 # v2.4.0
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload artifact
        uses: actions/upload-artifact@6f51ac03b9356f520e9adb1b1b7802705f340c2b # v4.5.0
        with:
          name: scorecard-sarif
          path: results.sarif
          retention-days: 5

      - name: Upload to code-scanning
        uses: github/codeql-action/upload-sarif@6825d5659bf007b85a0866e2d0f434aacf50de94 # v3.27.5
        with:
          sarif_file: results.sarif
