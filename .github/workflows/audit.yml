name: audit

on:
  schedule:
    - cron: "0 6 * * 1"
  push:
    paths:
      - "**/Cargo.toml"
      - "**/Cargo.lock"
      - "audit.toml"
      - ".github/workflows/audit.yml"
  pull_request:
    paths:
      - "**/Cargo.toml"
      - "**/Cargo.lock"
      - "audit.toml"

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  cargo-audit:
    name: cargo-audit (RustSec)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      checks: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: rustsec/audit-check@69366f33c96575abad1ee0dba8212993eecbe998 # v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # Same advisories documented in audit.toml at repo root.
          # rustsec/audit-check@v2 does NOT auto-read audit.toml, and
          # multi-line input is joined with newlines into a single
          # --ignore arg (malformed). Pass as comma-separated. Keep
          # both files in sync.
          ignore: RUSTSEC-2023-0071,RUSTSEC-2025-0119,RUSTSEC-2024-0370
