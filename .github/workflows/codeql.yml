name: codeql

# Static analysis via GitHub CodeQL. Targets `actions` (workflow
# hardening) and `rust` (experimental, autobuild from cargo). The
# rust matrix entry uses the same codeql-action SHA as scorecard.yml
# so we have a single pinned source-of-truth across security
# workflows.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 8 * * 1"

permissions:
  contents: read

jobs:
  analyze:
    name: analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: [actions, rust]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # CodeQL's PR-diff-range feature needs the merge base, not
          # just HEAD. Without depth 0 the diff returns "undefined,
          # undefined, undefined" rows that fail extension parsing
          # (restrictAlertsTo signature) and the analyzer exits 2.
          fetch-depth: 0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@9e0d7b8d25671d64c341c19c0152d693099fb5ba # v4.35.5
        with:
          languages: ${{ matrix.language }}

      - name: Autobuild
        uses: github/codeql-action/autobuild@9e0d7b8d25671d64c341c19c0152d693099fb5ba # v4.35.5

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@9e0d7b8d25671d64c341c19c0152d693099fb5ba # v4.35.5
        with:
          category: "/language:${{ matrix.language }}"
